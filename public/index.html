<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We Can Do Something About It</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="site-title">We Can Do Something About It</h1>
    <p class="subtitle">You won't put your email in. No balls.</p>

    <div class="counter-section">
      <div class="counter" id="counter">0</div>
      <div class="counter-label">people have signed up</div>
    </div>

    <form id="signup-form" class="signup-form">
      <div class="form-group">
        <label for="email">Your Email <span class="email-note">(won't send you any bullsh*t)</span></label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="issue">What do you think everyone could agree on? <span class="char-info">(<span id="char-count">0</span>/150)</span></label>
        <textarea id="issue" placeholder="150 characters or less..." maxlength="150" rows="3"></textarea>
      </div>

      <button type="submit" class="btn-submit">I'm In</button>
    </form>

    <div id="success-message" class="success-message hidden">
      <div class="success-icon">&#10003;</div>
      <p>You're in. Thank you for standing up.</p>
    </div>

    <div id="issues-section" class="issues-section hidden">
      <h2>What People Agree On</h2>
      <div id="issues-list" class="issues-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
